<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="/icon.png">

    <style>
        #gallery-loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        #gallery-loader img {
            width: 100px;
            height: 100px;
            /* Optional: spinning animation */
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

        }

        /* Мобильная версия для главной */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: row;
                justify-content: space-between;
                padding: 0 2rem;
            }

            .header-left {
                width: auto;
                justify-content: flex-start;
            }

            .header-right {
                width: auto;
                justify-content: flex-end;
                gap: 0.5rem;
            }

            .header-right .search-box,
            .header-right .theme-toggle {
                display: none;
            }

            .header-right .filters-link {
                display: inline-block;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                </div>
                <a href="/filters" class="filters-link">Навигация</a>
                <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                    <span class="light-icon">●</span>
                    <span class="dark-icon">○</span>
                </button>
            </div>
        </div>
    </header>

    <body class="home-page">

        <main>
            <div class="gallery" id="gallery">
                <div class="gallery-sizer"></div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <div class="footer-copyright">
                    Привет, напиши мне
                </div>
                <div class="footer-links">
                    <a href="https://www.tumblr.com/pletnyov" class="footer-link" target="_blank">Tumblr</a>
                    <a href="mailto:pletnyovstepan@gmail.com" class="footer-link">Email</a>
                    <a href="https://www.instagram.com/psychedelic_bully/" class="footer-link"
                        target="_blank">Instagram</a>
                    <a href="https://t.me/s/mix_culture" class="footer-link" target="_blank">Telegram</a>
                </div>
            </div>
        </footer>

        <script src="./script.js"></script>

    </body>

</html>
