<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov</title>
    <link rel="stylesheet" href="./style.css">

    <style>
        /* ===== Lazy Media Effect ===== */

        .media-item {
            position: relative;
            overflow: hidden;
            background: #f2f2f2;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: auto;
            display: block;

            opacity: 0;
            filter: blur(20px);
            transform: scale(1.05);
            transition:
                opacity 0.6s ease,
                filter 0.8s ease,
                transform 0.8s ease;
        }

        .media-item.loaded img,
        .media-item.loaded video {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                </div>
                <!-- + + + Новая кнопка переключения темы + + + -->
                <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                    <span class="light-icon">☀️</span>
                    <span class="dark-icon">🌙</span>
                </button>
                <!-- + + + Конец новой кнопки + + + -->
                <a href="/filters" class="filters-link">Фильтры</a>
            </div>
        </div>
    </header>

    <main>
        <div class="gallery" id="gallery">
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-copyright">
                © 2024 Portfolio
            </div>
            <div class="footer-links">
                <a href="https://tumblr.com" class="footer-link" target="_blank">Tumblr</a>
                <a href="mailto:hello@example.com" class="footer-link">Email</a>
                <a href="https://instagram.com" class="footer-link" target="_blank">Instagram</a>
            </div>
        </div>
    </footer>

    <script src="./script.js"></script>

</body>

</html>
