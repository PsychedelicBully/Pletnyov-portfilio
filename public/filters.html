<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov — Filters</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Мобильная версия для страницы фильтров */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: row;
                justify-content: space-between;
                padding: 0 2rem;
            }

            .header-left {
                width: auto;
                justify-content: flex-start;
            }

            .header-right {
                width: auto;
                justify-content: flex-end;
                gap: 0.5rem;
            }

            .header-right .filters-link {
                display: none;
            }

            .header-right .search-box,
            .header-right .theme-toggle {
                display: block;
            }

            .search-input {
                width: 100px;
            }

            .search-input:focus {
                width: 140px;
            }

            /* Двухколоночная сетка для фильтров на мобильных */
            .filters-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bottom-row {
                grid-template-columns: repeat(2, 1fr);
            }

            /* Touch me на всю ширину */
            .bottom-row .group:last-child {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                </div>
                <a href="/filters" class="filters-link">Навигация</a>
                <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                    <span class="light-icon">●</span>
                    <span class="dark-icon">○</span>
                </button>
            </div>
        </div>
    </header>

    <main class="filters-wrapper">

        <div class="filters-grid" id="topGroups"></div>
        <div class="bottom-row" id="bottomGroups"></div>

    </main>

    <script>
        const GROUPS = {
            Prefiltered: ["me"],
            Team: [],
            Scene: [],
            Object: [],
            Wearables: [],
            Year: [],
            More: [],
            Color: [],
            "Touch me": []
        };

        const PREFILTERED = ["me", "design", "fun", "real", "art"]
        const COLORS = ["black", "blue", "green", "grey", "red", "orange", "pink", "yellow", "metal", "paper", "white"];
        const WEARABLE = ["bag", "dress", "hoodie", "jacket", "shirt", "shoes", "wear", "denim", "glasses", "mens", "womens"];
        const OBJECT = ["architecture", "furniture", "home", "object", "paintings", "toy", "transport", "watch", "sport", "urban", "light"];
        const SCENE = ["logo", "package", "font", "letters", "photo", "video", "print", "typography", "product", "gfx", "navigation", "interface", "concept", "sketch", "idea", "decal", "art", "prompt", "craft", "camera", "music"];
        const TEAM = ["solo", "cult", "kontur", "hazeon", "als", "hityre", "netnet", "studies", "kseniashnaider"];

        function classify(tag) {
            const t = tag.toLowerCase();
            if (/^\d{4}$/.test(t) || t === "1999+") return "Year";
            if (COLORS.includes(t)) return "Color";
            if (WEARABLE.some(w => t.includes(w))) return "Wearables";
            if (OBJECT.includes(t)) return "Object";
            if (SCENE.includes(t)) return "Scene";
            if (TEAM.includes(t)) return "Team";
            return "More";
        }

        document.addEventListener('DOMContentLoaded', async () => {

            const res = await fetch('/api/tumblr');
            const data = await res.json();
            const posts = data.response.posts || [];

            const tagCounts = new Map();

            posts.forEach(post => {
                (post.tags || []).forEach(tag => {
                    const clean = tag.toLowerCase().trim();
                    tagCounts.set(clean, (tagCounts.get(clean) || 0) + 1);
                });
            });

            tagCounts.forEach((count, tag) => {
                const group = classify(tag);
                GROUPS[group].push({ tag, count });
            });

            Object.keys(GROUPS).forEach(group => {
                GROUPS[group].sort((a, b) => a.tag.localeCompare(b.tag));
            });

            renderGroups();
        });

        function renderGroups() {

            const top = document.getElementById("topGroups");
            const bottom = document.getElementById("bottomGroups");

            const topOrder = ["Prefiltered", "Team", "Scene", "Object", "Wearables", "Year"];
            const bottomOrder = ["More", "Color", "Touch me"];

            topOrder.forEach(group => {
                top.appendChild(createGroup(group, GROUPS[group]));
            });

            bottomOrder.forEach(group => {
                if (group === "Touch me") {
                    bottom.appendChild(createContactGroup());
                } else {
                    bottom.appendChild(createGroup(group, GROUPS[group]));
                }
            });
        }

        function createContactGroup() {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title rainbow";
            heading.innerHTML = "Touch me"
                .split("")
                .map(letter => `<span>${letter}</span>`)
                .join("");
            wrapper.appendChild(heading);

            wrapper.innerHTML += `
        <a href="https://instagram.com/" target="_blank">instagram</a>
        <a href="mailto:pletnyovstepan@gmail.com">pletnyovstepan@gmail.com</a>
        <a href="https://t.me/" target="_blank">telegram</a>
    `;

            return wrapper;
        }

        function createGroup(title, items) {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title";
            heading.textContent = title;
            wrapper.appendChild(heading);

            items.forEach(item => {
                const link = document.createElement("a");
                link.href = `/?filter=${encodeURIComponent(item.tag)}`;
                link.textContent = item.tag;
                wrapper.appendChild(link);
            });

            return wrapper;
        }

        function setupThemeToggle() {
            const toggleBtn = document.getElementById('themeToggle');
            if (!toggleBtn) return;
            const savedTheme = localStorage.getItem('site-theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            }
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('site-theme',
                    document.body.classList.contains('dark-theme') ? 'dark' : 'light'
                );
            });
        }
        setupThemeToggle();
    </script>

</body>

</html>
