<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov — Filters</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            font-size: 16px;
            background: #fff;
            color: #000;
        }

        /* HEADER */

        header {
            padding: 20px 30px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        header a {
            text-decoration: none;
            color: #000;
        }

        /* MAIN GRID */

        .filters-wrapper {
            padding: 40px 30px 80px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            column-gap: 60px;
            row-gap: 40px;
        }

        .group-title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .group a {
            display: block;
            text-decoration: none;
            color: #000;
            line-height: 1.6;
        }

        .group a:hover {
            text-decoration: underline;
        }

        /* bottom row */

        .bottom-row {
            margin-top: 80px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 60px;
        }
    </style>
</head>

<body>

    <header>
        <a href="/">Schnaider</a>
        <a href="/">← Back</a>
    </header>

    <main class="filters-wrapper">

        <div class="filters-grid" id="topGroups"></div>

        <div class="bottom-row" id="bottomGroups"></div>

    </main>

    <script>

        const GROUPS = {
            Prefiltered: [],
            Team: [],
            Scene: [],
            Object: [],
            Wearables: [],
            Year: [],
            More: [],
            Color: [],
            "Touch me": []
        };

        const COLORS = ["black", "blue", "green", "red", "orange", "pink", "yellow", "metal", "paper", "white"];
        const WEARABLE = ["bag", "dress", "hoodie", "jacket", "shirt", "shoes", "wear", "denim", "glasses", "mens", "womens"];
        const OBJECT = ["architecture", "furniture", "home", "object", "paintings", "toy", "transport", "watch", "sport", "urban", "light"];
        const SCENE = ["logo", "package", "product", "gfx", "navigation", "interface", "concept", "sketch", "idea", "decal", "art", "prompt", "craft", "camera", "music"];
        const TEAM = ["solo", "yandex", "sila", "kley", "als", "hityre", "netnet", "studies", "kseniashnaider"];

        function classify(tag) {
            const t = tag.toLowerCase();

            if (/^\d{4}$/.test(t) || t === "1999+") return "Year";
            if (COLORS.includes(t)) return "Color";
            if (WEARABLE.some(w => t.includes(w))) return "Wearables";
            if (OBJECT.includes(t)) return "Object";
            if (SCENE.includes(t)) return "Scene";
            if (TEAM.includes(t)) return "Team";

            return "More";
        }

        document.addEventListener('DOMContentLoaded', async () => {

            const res = await fetch('/api/tumblr');
            const data = await res.json();
            const posts = data.response.posts || [];

            const tagCounts = new Map();

            posts.forEach(post => {
                (post.tags || []).forEach(tag => {
                    const clean = tag.toLowerCase().trim();
                    tagCounts.set(clean, (tagCounts.get(clean) || 0) + 1);
                });
            });

            tagCounts.forEach((count, tag) => {
                const group = classify(tag);
                GROUPS[group].push({ tag, count });
            });

            Object.keys(GROUPS).forEach(group => {
                GROUPS[group].sort((a, b) => a.tag.localeCompare(b.tag));
            });

            renderGroups();
        });

        function renderGroups() {

            const top = document.getElementById("topGroups");
            const bottom = document.getElementById("bottomGroups");

            const topOrder = ["Prefiltered", "Team", "Scene", "Object", "Wearables", "Year"];
            const bottomOrder = ["More", "Color", "Touch me"];

            topOrder.forEach(group => {
                const div = createGroup(group, GROUPS[group]);
                top.appendChild(div);
            });

            bottomOrder.forEach(group => {
                const div = createGroup(group, GROUPS[group]);
                bottom.appendChild(div);
            });
        }

        function createGroup(title, items) {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title";
            heading.textContent = title;
            wrapper.appendChild(heading);

            items.forEach(item => {
                const link = document.createElement("a");
                link.href = `/?filter=${encodeURIComponent(item.tag)}`;
                link.textContent = item.tag;
                wrapper.appendChild(link);
            });

            return wrapper;
        }

    </script>

</body>

</html>
