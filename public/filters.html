<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov — Filters</title>
    <link rel="stylesheet" href="./style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 18px;
            background: #fff;
            color: #000;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f0f0f0;
            padding: 1rem 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .site-title {
            font-size: 1rem;
            font-weight: 500;
            color: #000;
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .site-title:hover {
            opacity: 0.7;
        }

        .main-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            font-size: 1rem;
            color: #000;
            text-decoration: none;
            font-weight: 400;
            letter-spacing: -0.01em;
            transition: opacity 0.2s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            opacity: 1;
            border-bottom: 1px solid #000;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            border: none;
            background: transparent;
            padding: 0.5rem 0;
            font-size: 1rem;
            width: 120px;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
            color: #000;
        }

        .search-input:focus {
            outline: none;
            border-bottom-color: #000;
            width: 180px;
        }

        .search-input::placeholder {
            color: #666;
            font-weight: 400;
        }


        /* MAIN GRID */

        .filters-wrapper {
            max-width: 1400px;
            /* как в header-content */
            margin: 80px auto 80px;
            /* центрирование + отступ сверху */
            padding: 0 2rem;
            /* такие же боковые отступы */
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            column-gap: 20px;
            row-gap: 40px;
        }

        .group-title {
            font-weight: bold;
            margin-bottom: 10px;
        }


        /* bottom row */

        .bottom-row {
            margin-top: 80px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 20px;
        }

        .rainbow span:nth-child(1) {
            color: #ff0000;
        }

        .rainbow span:nth-child(2) {
            color: #ff7f00;
        }

        .rainbow span:nth-child(3) {
            color: #ffff00;
        }

        .rainbow span:nth-child(4) {
            color: #00ff00;
        }

        .rainbow span:nth-child(5) {
            color: #00bfff;
        }

        .rainbow span:nth-child(6) {
            color: #0000ff;
        }

        .rainbow span:nth-child(7) {
            color: #8b00ff;
        }

        .rainbow span:nth-child(8) {
            color: #ff1493;
        }


        @media (max-width: 768px) {
            .filters-wrapper {
                margin-top: 120px;
                /* увеличенный отступ для мобильных, где хедер может занимать больше места */
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                </div>
                <a href="/filters" class="filters-link">Фильтры</a>
            </div>
        </div>
    </header>

    <main class="filters-wrapper">

        <div class="filters-grid" id="topGroups"></div>

        <div class="bottom-row" id="bottomGroups"></div>

    </main>

    <script>

        const GROUPS = {
            Prefiltered: [],
            Team: [],
            Scene: [],
            Object: [],
            Wearables: [],
            Year: [],
            More: [],
            Color: [],
            "Touch me": []
        };

        const COLORS = ["black", "blue", "green", "red", "orange", "pink", "yellow", "metal", "paper", "white"];
        const WEARABLE = ["bag", "dress", "hoodie", "jacket", "shirt", "shoes", "wear", "denim", "glasses", "mens", "womens"];
        const OBJECT = ["architecture", "furniture", "home", "object", "paintings", "toy", "transport", "watch", "sport", "urban", "light"];
        const SCENE = ["logo", "package", "product", "gfx", "navigation", "interface", "concept", "sketch", "idea", "decal", "art", "prompt", "craft", "camera", "music"];
        const TEAM = ["solo", "yandex", "sila", "kley", "als", "hityre", "netnet", "studies", "kseniashnaider"];

        function classify(tag) {
            const t = tag.toLowerCase();

            if (/^\d{4}$/.test(t) || t === "1999+") return "Year";
            if (COLORS.includes(t)) return "Color";
            if (WEARABLE.some(w => t.includes(w))) return "Wearables";
            if (OBJECT.includes(t)) return "Object";
            if (SCENE.includes(t)) return "Scene";
            if (TEAM.includes(t)) return "Team";

            return "More";
        }

        document.addEventListener('DOMContentLoaded', async () => {

            const res = await fetch('/api/tumblr');
            const data = await res.json();
            const posts = data.response.posts || [];

            const tagCounts = new Map();

            posts.forEach(post => {
                (post.tags || []).forEach(tag => {
                    const clean = tag.toLowerCase().trim();
                    tagCounts.set(clean, (tagCounts.get(clean) || 0) + 1);
                });
            });

            tagCounts.forEach((count, tag) => {
                const group = classify(tag);
                GROUPS[group].push({ tag, count });
            });

            Object.keys(GROUPS).forEach(group => {
                GROUPS[group].sort((a, b) => a.tag.localeCompare(b.tag));
            });

            renderGroups();
        });

        function renderGroups() {

            const top = document.getElementById("topGroups");
            const bottom = document.getElementById("bottomGroups");

            const topOrder = ["Prefiltered", "Team", "Scene", "Object", "Wearables", "Year"];
            const bottomOrder = ["More", "Color", "Touch me"];

            topOrder.forEach(group => {
                const div = createGroup(group, GROUPS[group]);
                top.appendChild(div);
            });

            bottomOrder.forEach(group => {

                if (group === "Touch me") {
                    bottom.appendChild(createContactGroup());
                } else {
                    bottom.appendChild(createGroup(group, GROUPS[group]));
                }

            });
        }

        function createContactGroup() {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title rainbow";
            heading.innerHTML = "Touch me"
                .split("")
                .map(letter => `<span>${letter}</span>`)
                .join("");
            wrapper.appendChild(heading);

            const ig = document.createElement("a");
            ig.href = "https://instagram.com/твой_профиль";
            ig.target = "_blank";
            ig.textContent = "instagram";
            wrapper.appendChild(ig);

            const mail = document.createElement("a");
            mail.href = "mailto:pletnyovstepan@gmail.com";
            mail.textContent = "pletnyovstepan@gmail.com";
            wrapper.appendChild(mail);

            const tg = document.createElement("a");
            tg.href = "https://t.me/твой_username";  // ← вставь сюда свой username
            tg.target = "_blank";
            tg.textContent = "telegram";
            wrapper.appendChild(tg);

            return wrapper;
        }

        function createGroup(title, items) {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title";
            heading.textContent = title;
            wrapper.appendChild(heading);

            items.forEach(item => {
                const link = document.createElement("a");
                link.href = `/?filter=${encodeURIComponent(item.tag)}`;
                link.textContent = item.tag;
                wrapper.appendChild(link);
            });

            return wrapper;
        }

    </script>

</body>

</html>
