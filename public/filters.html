<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov — Filters</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/icon.png">
    <style>
        #gallery-loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        #gallery-loader img {
            width: 100px;
            height: 100px;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Мобильная версия для страницы фильтров */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: row;
                justify-content: space-between;
                padding: 0 2rem;
            }

            .header-left {
                width: auto;
                justify-content: flex-start;
            }

            .header-right {
                width: auto;
                justify-content: flex-end;
                gap: 0.5rem;
            }

            .header-right .filters-link {
                display: none;
            }

            .header-right .search-box,
            .header-right .theme-toggle {
                display: block;
            }

            .search-input {
                width: 100px;
            }

            .search-input:focus {
                width: 140px;
            }

            /* Двухколоночная сетка для фильтров на мобильных */
            .filters-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bottom-row {
                grid-template-columns: repeat(2, 1fr);
            }

            /* Touch me на всю ширину */
            .bottom-row .group:last-child {
                grid-column: 1 / -1;
            }

        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                </div>
                <a href="/filters" class="filters-link">Навигация</a>
                <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                    <span class="light-icon">●</span>
                    <span class="dark-icon">○</span>
                </button>
            </div>
        </div>
    </header>

    <main class="filters-wrapper">

        <div class="filters-grid" id="topGroups"></div>
        <div class="bottom-row" id="bottomGroups"></div>

    </main>

    <script>
        const GROUPS = {
            Prefiltered: [],
            Team: [],
            Scene: [],
            Object: [],
            Wearables: [],
            Year: [],
            More: [],
            Color: [],
            "Touch me": []
        };

        const PREFILTERED = ["essentials", "official", "live", "real", "fun", "art"]
        const COLORS = ["black", "blue", "green", "grey", "red", "orange", "pink", "yellow", "metal", "paper", "white", "purple"];
        const WEARABLE = ["bag", "dress", "hoodie", "jacket", "shirt", "shoes", "wear", "denim", "glasses", "mens", "womens", "top", "necklace", "mask", "long", "hat"];
        const OBJECT = ["architecture", "furniture", "home", "object", "paintings", "toy", "transport", "watch", "sport", "urban", "light", "sculpture", "hair", "food"];
        const SCENE = ["logo", "package", "font", "letters", "photo", "video", "print", "typography", "product", "gfx", "navigation", "interface", "concept", "sketch", "idea", "decal", "art", "prompt", "craft", "camera", "music", "3d", "illustration", "poster", "lettering", "identity", "animation", "ai", "backstage"];
        const TEAM = ["solo", "cult", "kontur", "hazeon", "als", "hityre", "netnet", "studies", "kseniashnaider"];

        function classify(tag) {
            const t = tag.toLowerCase();
            if (PREFILTERED.includes(t)) return "Prefiltered";
            if (/^\d{4}$/.test(t) || t === "1999+") return "Year";
            if (COLORS.includes(t)) return "Color";
            if (WEARABLE.some(w => t.includes(w))) return "Wearables";
            if (OBJECT.includes(t)) return "Object";
            if (SCENE.includes(t)) return "Scene";
            if (TEAM.includes(t)) return "Team";
            return "More";
        }

        document.addEventListener('DOMContentLoaded', async () => {

            // Add loader
            const loader = document.createElement('div');
            loader.id = 'gallery-loader';
            loader.innerHTML = '<img src="/icon_loader.png" alt="">';
            document.body.appendChild(loader);

            const tagCounts = new Map();
            let before = null;
            let hasMore = true;

            while (hasMore) {
                const url = `/api/tumblr?limit=20${before ? `&before=${before}` : ''}`;
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    const posts = data.response?.posts || [];

                    posts.forEach(post => {
                        (post.tags || []).forEach(tag => {
                            const clean = tag.toLowerCase().trim();
                            tagCounts.set(clean, (tagCounts.get(clean) || 0) + 1);
                        });
                    });

                    if (posts.length < 20) {
                        hasMore = false;
                    } else {
                        before = posts[posts.length - 1].timestamp;
                    }
                } catch (e) {
                    hasMore = false;
                }
            }

            // Remove loader
            loader.remove();

            tagCounts.forEach((count, tag) => {
                const group = classify(tag);
                GROUPS[group].push({ tag, count });
            });

            Object.keys(GROUPS).forEach(group => {
                GROUPS[group].sort((a, b) => a.tag.localeCompare(b.tag));
            });

            renderGroups();
        });

        function renderGroups() {

            const top = document.getElementById("topGroups");
            const bottom = document.getElementById("bottomGroups");

            const topOrder = ["Prefiltered", "Team", "Scene", "Object", "Wearables", "Year"];
            const bottomOrder = ["More", "Color", "Touch me"];

            topOrder.forEach(group => {
                top.appendChild(createGroup(group, GROUPS[group]));
            });

            bottomOrder.forEach(group => {
                if (group === "Touch me") {
                    bottom.appendChild(createContactGroup());
                } else {
                    bottom.appendChild(createGroup(group, GROUPS[group]));
                }
            });
        }

        function createContactGroup() {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title rainbow";
            heading.innerHTML = "Touch me"
                .split("")
                .map(letter => `<span>${letter}</span>`)
                .join("");
            wrapper.appendChild(heading);

            wrapper.innerHTML += `
        <a href="https://www.instagram.com/psychedelic_bully/" target="_blank">instagram</a>
        <a href="mailto:pletnyovstepan@gmail.com">pletnyovstepan@gmail.com</a>
        <a href="https://t.me/s/mix_culture" target="_blank">telegram</a>
    `;

            return wrapper;
        }

        function createGroup(title, items) {

            const wrapper = document.createElement("div");
            wrapper.className = "group";

            const heading = document.createElement("div");
            heading.className = "group-title";
            heading.textContent = title;
            wrapper.appendChild(heading);

            items.forEach(item => {
                const link = document.createElement("a");
                link.href = `/?filter=${encodeURIComponent(item.tag)}`;
                link.textContent = item.tag;
                wrapper.appendChild(link);
            });

            return wrapper;
        }

        function setupThemeToggle() {
            const toggleBtn = document.getElementById('themeToggle');
            if (!toggleBtn) return;
            const savedTheme = localStorage.getItem('site-theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
            }
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                localStorage.setItem('site-theme',
                    document.body.classList.contains('dark-theme') ? 'dark' : 'light'
                );
            });
        }
        setupThemeToggle();
    </script>

</body>

</html>
