<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* ================== GRID LAYOUT ================== */
        .post-layout {
            display: grid;
            grid-template-columns: 400px 220px 1fr;
            min-height: 100vh;
        }

        /* ===== LEFT COLUMN: MEDIA ===== */
        .left-column {
            padding: 40px 20px;
            border-right: 1px solid #eee;
        }

        .post-media {
            width: 100%;
        }

        .post-media img,
        .post-media video,
        .post-media iframe {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        /* ===== CENTER COLUMN: HEADERS / NAVIGATION ===== */
        .center-column {
            padding: 40px 20px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 16px;
        }

        .center-column h2 {
            font-size: 18px;
            font-weight: 600;
            color: #111;
        }

        /* ===== RIGHT COLUMN: DATA / POST CONTENT ===== */
        .right-column {
            padding: 40px 20px;
        }

        .post-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .post-date,
        .post-id {
            font-size: 14px;
            color: #777;
            margin-bottom: 12px;
        }

        .post-description {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .post-tags {
            margin-bottom: 20px;
        }

        .post-tags .tag {
            display: inline-block;
            font-size: 13px;
            color: #555;
            margin-right: 8px;
        }

        /* SHARE BUTTONS */
        .share-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .share-buttons a {
            font-size: 14px;
            color: #0056b3;
        }

        /* PREV / NEXT */
        .post-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 14px;
        }

        /* ================== RESPONSIVE ================== */
        @media (max-width: 1200px) {
            .post-layout {
                grid-template-columns: 1fr 200px 1fr;
            }
        }

        @media (max-width: 900px) {
            .post-layout {
                grid-template-columns: 1fr;
            }

            .left-column,
            .center-column,
            .right-column {
                border: none;
                padding: 20px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="post-layout">

        <!-- LEFT: MEDIA -->
        <div class="left-column">
            <div class="post-media" id="postMedia">
                Loading...
            </div>
        </div>

        <!-- CENTER: HEADERS / NAVIGATION -->
        <div class="center-column">
            <h2>Post</h2>
            <h2>Share</h2>
            <h2>Navigation</h2>
        </div>

        <!-- RIGHT: POST DATA -->
        <div class="right-column">
            <div class="post-title" id="postTitle"></div>
            <div class="post-date" id="postDate"></div>
            <div class="post-description" id="postDescription"></div>
            <div class="post-tags" id="postTags"></div>
            <div class="post-id" id="postId"></div>

            <div class="share-buttons">
                <a href="#" id="shareFacebook">Facebook</a>
                <a href="#" id="shareLinkedIn">LinkedIn</a>
                <a href="#" id="sharePinterest">Pinterest</a>
                <a href="#" id="shareTumblr">Tumblr</a>
                <a href="#" id="shareTwitter">Twitter</a>
            </div>

            <div class="post-navigation">
                <a href="#" id="prevPost">Предыдущее</a>
                <a href="#" id="nextPost">Далее</a>
            </div>
        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) return;
                const posts = await this.fetchPosts();
                const post = posts.find(p =>
                    String(p.id) === this.postId ||
                    p.id_string === this.postId
                );
                if (post) this.render(post);
            }

            async fetchPosts() {
                const res = await fetch('/api/tumblr');
                const data = await res.json();
                return data.response.posts || [];
            }

            render(post) {
                // TITLE
                document.getElementById('postTitle').textContent =
                    post.summary || post.title || '';

                // DATE
                if (post.date) {
                    const d = new Date(post.date);
                    document.getElementById('postDate').textContent =
                        d.toLocaleDateString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                }

                // DESCRIPTION
                if (post.caption) {
                    document.getElementById('postDescription').innerHTML = post.caption;
                } else if (post.body) {
                    document.getElementById('postDescription').innerHTML = post.body;
                }

                // TAGS
                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<span class="tag">#${tag}</span>`
                        ).join('');
                }

                // POST ID
                document.getElementById('postId').textContent = `ID: ${post.id || post.id_string}`;

                // MEDIA
                const media = document.getElementById('postMedia');
                media.innerHTML = '';

                // HTML-пост
                if (post.format === "html" && post.body) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(post.body, 'text/html');
                    const mediaElements = doc.querySelectorAll('img, video, iframe');
                    mediaElements.forEach(el => {
                        media.appendChild(el.cloneNode(true));
                    });
                }

                // Фото-пост
                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        media.appendChild(img);
                    });
                }

                // SHARE LINKS (пример генерации URL)
                const url = encodeURIComponent(window.location.href);
                document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer.php?u=${url}`;
                document.getElementById('shareLinkedIn').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
                document.getElementById('sharePinterest').href = `https://pinterest.com/pin/create/button/?url=${url}`;
                document.getElementById('shareTumblr').href = `https://www.tumblr.com/widgets/share/tool?canonicalUrl=${url}`;
                document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?url=${url}`;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>

</body>

</html>
