<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov - Post</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .post-container {
            max-width: 1000px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .post-header {
            margin-bottom: 40px;
        }

        .post-title {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .post-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .post-content {
            margin-bottom: 40px;
        }

        .post-content img {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .post-content iframe {
            width: 100%;
            max-width: 100%;
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
        }

        .post-content video {
            width: 100%;
            margin-bottom: 20px;
        }

        .post-tags {
            margin: 30px 0;
        }

        .tag {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 15px;
            margin: 0 10px 10px 0;
            border-radius: 3px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #000;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .back-link:hover {
            border-bottom-color: #000;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <a href="/" class="back-link">← Back to Gallery</a>
            </div>
        </div>
    </header>

    <main>
        <div class="post-container">
            <div class="post-header">
                <h1 class="post-title" id="postTitle">Loading post...</h1>
                <div class="post-meta" id="postMeta"></div>
            </div>

            <div class="post-content" id="postContent">
                Loading content...
            </div>

            <div class="post-tags" id="postTags"></div>

            <a href="/" class="back-link">← Back to Gallery</a>
        </div>
    </main>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostIdFromUrl();
                this.init();
            }

            getPostIdFromUrl() {
                const pathParts = window.location.pathname.split('/');
                return pathParts[pathParts.length - 1];
            }

            async init() {
                if (!this.postId) {
                    this.showError('Post ID not found in URL');
                    return;
                }
                await this.loadPost();
            }

            async loadPost() {
                try {
                    const posts = await this.fetchPosts();
                    const post = posts.find(
                        p => String(p.id) === this.postId || p.id_string === this.postId
                    );

                    console.log("FOUND POST:", post);

                    if (!post) {
                        this.showError('Post not found');
                        return;
                    }

                    this.displayPost(post);
                } catch (error) {
                    console.error('Error loading post:', error);
                    this.showError('Failed to load post');
                }
            }

            async fetchPosts() {
                const response = await fetch('/api/tumblr');
                if (!response.ok) throw new Error('API request failed');
                const data = await response.json();
                return data.response.posts || [];
            }

            displayPost(post) {
                // Заголовок
                document.getElementById('postTitle').textContent =
                    post.summary || post.title || 'Untitled Work';

                // Дата
                const dateElement = document.getElementById('postMeta');
                if (post.date) {
                    const date = new Date(post.date);
                    dateElement.textContent = date.toLocaleDateString('ru-RU', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                }

                // Основной контент (КЛЮЧЕВОЕ ИЗМЕНЕНИЕ)
                const contentElement = document.getElementById('postContent');
                contentElement.innerHTML = '';

                if (post.format === "html" && post.body) {
                    contentElement.innerHTML = post.body;
                } else if (post.caption) {
                    contentElement.innerHTML = post.caption;
                } else {
                    contentElement.innerHTML = "<p>No content available.</p>";
                }

                // Теги
                const tagsElement = document.getElementById('postTags');
                if (post.tags && post.tags.length > 0) {
                    tagsElement.innerHTML = post.tags.map(tag =>
                        `<span class="tag">#${tag}</span>`
                    ).join('');
                }
            }

            showError(message) {
                document.querySelector('.post-container').innerHTML = `
                    <div style="text-align: center; padding: 100px 20px;">
                        <h2 style="margin-bottom: 20px;">${message}</h2>
                        <a href="/" class="back-link">← Back to Gallery</a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>
</body>

</html>
