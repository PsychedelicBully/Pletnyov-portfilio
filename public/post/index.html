<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>

    <style>
        /* =========================
   RESET
========================= */

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* =========================
   3 COLUMN MASTER GRID
========================= */

        .post-wrapper {
            display: grid;
            grid-template-columns: 220px 1fr 480px;
            min-height: 100vh;
        }

        /* =========================
   LEFT COLUMN
========================= */

        .left-col {
            padding: 40px 30px;
            border-right: 1px solid #e5e5e5;
        }

        .left-col a {
            text-decoration: none;
            font-size: 14px;
        }

        /* =========================
   CENTER COLUMN (MEDIA)
========================= */

        .center-col {
            padding: 100px 80px;
            display: flex;
            justify-content: center;
        }

        .media-container {
            width: 100%;
            max-width: 900px;
        }

        .media-container img,
        .media-container video,
        .media-container iframe {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 60px;
        }

        /* Tumblr NPF rows spacing fix */
        .media-container .npf_row {
            margin-bottom: 60px;
        }

        /* =========================
   RIGHT COLUMN (TEXT)
========================= */

        .right-col {
            padding: 100px 60px;
            border-left: 1px solid #e5e5e5;
        }

        .post-title {
            font-size: 26px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .post-date {
            font-size: 13px;
            margin-bottom: 36px;
        }

        .post-description {
            font-size: 15px;
            line-height: 1.65;
        }

        .post-description p {
            margin-bottom: 18px;
        }

        .post-tags {
            margin-top: 50px;
        }

        .tag {
            display: inline-block;
            font-size: 13px;
            margin-right: 12px;
            margin-bottom: 8px;
        }

        /* =========================
   RESPONSIVE BEHAVIOR
========================= */

        @media (max-width: 1400px) {
            .post-wrapper {
                grid-template-columns: 160px 1fr 420px;
            }

            .center-col {
                padding: 80px 50px;
            }

            .right-col {
                padding: 80px 40px;
            }
        }

        @media (max-width: 1100px) {
            .post-wrapper {
                grid-template-columns: 1fr;
            }

            .left-col,
            .right-col {
                border: none;
                padding: 40px 25px;
            }

            .center-col {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="post-wrapper">

        <!-- LEFT -->
        <div class="left-col">
            <a href="/">← Back</a>
        </div>

        <!-- CENTER (MEDIA) -->
        <div class="center-col">
            <div class="media-container" id="postMedia">
                Loading...
            </div>
        </div>

        <!-- RIGHT (TEXT) -->
        <div class="right-col">
            <div class="post-title" id="postTitle"></div>
            <div class="post-date" id="postDate"></div>
            <div class="post-description" id="postDescription"></div>
            <div class="post-tags" id="postTags"></div>
        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) return;
                const posts = await this.fetchPosts();
                const post = posts.find(p =>
                    String(p.id) === this.postId ||
                    p.id_string === this.postId
                );
                if (post) this.render(post);
            }

            async fetchPosts() {
                const res = await fetch('/api/tumblr');
                const data = await res.json();
                return data.response.posts || [];
            }

            render(post) {

                // TITLE
                document.getElementById('postTitle').textContent =
                    post.summary || post.title || '';

                // DATE
                if (post.date) {
                    const d = new Date(post.date);
                    document.getElementById('postDate').textContent =
                        d.toLocaleDateString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                }

                // DESCRIPTION (HTML preserved)
                if (post.caption) {
                    document.getElementById('postDescription').innerHTML = post.caption;
                } else if (post.body) {
                    document.getElementById('postDescription').innerHTML = post.body;
                }

                // TAGS
                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<span class="tag">#${tag}</span>`
                        ).join('');
                }

                // MEDIA EXTRACTION
                const media = document.getElementById('postMedia');
                media.innerHTML = '';

                if (post.format === "html" && post.body) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(post.body, 'text/html');
                    const elements = doc.querySelectorAll('img, video, iframe');

                    elements.forEach(el => {
                        media.appendChild(el.cloneNode(true));
                    });
                }

                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        media.appendChild(img);
                    });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>

</body>

</html>
