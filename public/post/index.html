<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* ===== GRID LAYOUT ===== */

        .post-layout {
            display: grid;
            grid-template-columns: 180px 1fr 420px;
            min-height: 100vh;
        }

        /* ===== LEFT COLUMN ===== */

        .left-column {
            padding: 40px 20px;
            border-right: 1px solid #eee;
        }

        .left-column a {
            text-decoration: none;
            color: #000;
            font-size: 14px;
        }

        /* ===== CENTER COLUMN (MEDIA) ===== */

        .center-column {
            padding: 80px 40px;
            display: flex;
            justify-content: center;
        }

        .post-media {
            width: 100%;
            max-width: 900px;
        }

        .post-media img,
        .post-media video,
        .post-media iframe {
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            display: block;
        }

        /* ===== RIGHT COLUMN (TEXT) ===== */

        .right-column {
            padding: 80px 40px;
            border-left: 1px solid #eee;
        }

        .post-title {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .post-date {
            font-size: 14px;
            color: #777;
            margin-bottom: 30px;
        }

        .post-description {
            font-size: 16px;
            line-height: 1.6;
        }

        .post-tags {
            margin-top: 40px;
        }

        .tag {
            display: inline-block;
            font-size: 13px;
            color: #555;
            margin-right: 10px;
        }

        /* ===== Responsive ===== */

        @media (max-width: 1200px) {
            .post-layout {
                grid-template-columns: 120px 1fr 360px;
            }
        }

        @media (max-width: 900px) {
            .post-layout {
                grid-template-columns: 1fr;
            }

            .left-column,
            .right-column {
                border: none;
                padding: 40px 20px;
            }

            .center-column {
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="post-layout">

        <!-- LEFT -->
        <div class="left-column">
            <a href="/">← Back</a>
        </div>

        <!-- CENTER (MEDIA) -->
        <div class="center-column">
            <div class="post-media" id="postMedia">
                Loading...
            </div>
        </div>

        <!-- RIGHT (TEXT) -->
        <div class="right-column">
            <div class="post-title" id="postTitle"></div>
            <div class="post-date" id="postDate"></div>
            <div class="post-description" id="postDescription"></div>
            <div class="post-tags" id="postTags"></div>
        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) return;
                const posts = await this.fetchPosts();
                const post = posts.find(p =>
                    String(p.id) === this.postId ||
                    p.id_string === this.postId
                );
                if (post) this.render(post);
            }

            async fetchPosts() {
                const res = await fetch('/api/tumblr');
                const data = await res.json();
                return data.response.posts || [];
            }

            render(post) {

                // TITLE
                document.getElementById('postTitle').textContent =
                    post.summary || post.title || '';

                // DATE
                if (post.date) {
                    const d = new Date(post.date);
                    document.getElementById('postDate').textContent =
                        d.toLocaleDateString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                }

                // DESCRIPTION
                if (post.caption) {
                    document.getElementById('postDescription').innerHTML = post.caption;
                } else if (post.body) {
                    document.getElementById('postDescription').innerHTML = post.body;
                }

                // TAGS
                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<span class="tag">#${tag}</span>`
                        ).join('');
                }

                // MEDIA
                const media = document.getElementById('postMedia');
                media.innerHTML = '';

                // Если это HTML-пост — извлекаем медиа из body
                if (post.format === "html" && post.body) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(post.body, 'text/html');

                    const mediaElements = doc.querySelectorAll('img, video, iframe');

                    mediaElements.forEach(el => {
                        media.appendChild(el.cloneNode(true));
                    });
                }

                // Если фото-пост
                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        media.appendChild(img);
                    });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>

</body>

</html>
