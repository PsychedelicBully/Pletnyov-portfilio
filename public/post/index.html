<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>
    <link rel="stylesheet" href="../style.css">

    <style>
        .post-container {
            max-width: 900px;
            margin: 80px auto 50px;
            padding: 0 20px;
        }
        .post-header {
            margin-bottom: 25px;
        }
        .post-title {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .post-meta {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 25px;
        }

        .post-content img {
            width: 100%;
            height: auto;
            margin: 1em 0;
            display: block;
        }
        .post-content iframe,
        .post-content embed,
        .post-content video {
            width: 100%;
            height: auto;
            margin: 1em 0;
        }

        .post-tags {
            margin-top: 30px;
        }
        .tag {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 12px;
            margin: 0 6px 6px 0;
            border-radius: 3px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            font-size: 0.9rem;
            text-decoration: none;
            color: #000;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .back-link:hover {
            border-bottom-color: #000;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <a href="/" class="back-link">← Back to Gallery</a>
        </div>
    </header>

    <main class="post-container">
        <div class="post-header">
            <h1 class="post-title" id="postTitle">Loading…</h1>
            <div class="post-meta" id="postMeta"></div>
        </div>

        <article class="post-content" id="postContent">
            Loading content…
        </article>

        <div class="post-tags" id="postTags"></div>
    </main>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostIdFromUrl();
                this.init();
            }

            getPostIdFromUrl() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) {
                    this.showError('Post ID not found');
                    return;
                }
                await this.loadPost();
            }

            async loadPost() {
                try {
                    const posts = await this.fetchPosts();
                    const post = posts.find(
                        p => String(p.id) === this.postId || p.id_string === this.postId
                    );

                    if (!post) {
                        this.showError('Post not found');
                        return;
                    }
                    this.renderPost(post);
                } catch (err) {
                    console.error(err);
                    this.showError('Failed to load post');
                }
            }

            async fetchPosts() {
                const res = await fetch('/api/tumblr');
                if (!res.ok) throw new Error('API request failed');
                const data = await res.json();
                return data.response.posts || [];
            }

            renderPost(post) {
                // Заголовок
                document.getElementById('postTitle').textContent = post.summary || post.title || '';

                // Дата
                const meta = document.getElementById('postMeta');
                if (post.date) {
                    const d = new Date(post.date);
                    meta.textContent = d.toLocaleDateString('ru-RU', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric'
                    });
                }

                // Основной HTML контент
                const contentEl = document.getElementById('postContent');
                contentEl.innerHTML = '';

                if (post.format === "html" && post.body) {
                    contentEl.innerHTML = post.body;
                } else if (post.caption) {
                    contentEl.innerHTML = post.caption;
                }

                // Теги
                const tagsEl = document.getElementById('postTags');
                if (post.tags && post.tags.length) {
                    tagsEl.innerHTML = post.tags.map(tag =>
                        `<span class="tag">#${tag}</span>`
                    ).join('');
                }
            }

            showError(msg) {
                document.body.innerHTML = `
                    <div style="padding:60px; text-align:center;">
                        <h2>${msg}</h2>
                        <a href="/" class="back-link">← Back to Gallery</a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>

</body>

</html>
