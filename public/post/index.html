<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Базовый сброс */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #111;
            background: #fff;
        }

        /* Трёхколоночная сетка */
        .post-layout {
            display: grid;
            grid-template-columns: minmax(300px, 1.2fr) 140px 1fr;
            min-height: 100vh;
        }

        /* Левая колонка – медиа */
        .left-column {
            padding: 40px 30px 40px 40px;
            border-right: 1px solid #eaeaea;
            overflow-y: auto;
            max-height: 100vh;
            position: sticky;
            top: 0;
        }

        .post-media {
            width: 100%;
        }

        .post-media img,
        .post-media video,
        .post-media iframe {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        /* Центральная колонка – заголовки */
        .center-column {
            padding: 40px 20px;
            border-right: 1px solid #eaeaea;
            font-size: 14px;
            font-weight: 400;
            color: #777;
            line-height: 1.8;
        }

        .center-column h2 {
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            color: #111;
        }

        .center-column h2:not(:first-child) {
            margin-top: 40px;
        }

        /* Правая колонка – данные поста */
        .right-column {
            padding: 40px 30px 40px 30px;
            max-width: 600px;
        }

        .post-title {
            font-size: 28px;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.01em;
        }

        .post-date {
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 20px;
        }

        .post-description {
            font-size: 16px;
            margin-bottom: 30px;
            color: #333;
        }

        .post-description p {
            margin-bottom: 1em;
        }

        .post-tags {
            margin-bottom: 30px;
            border-top: 1px solid #eaeaea;
            padding-top: 30px;
        }

        .post-tags .tag {
            display: inline-block;
            font-size: 13px;
            color: #777;
            margin-right: 15px;
            margin-bottom: 8px;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .post-tags .tag:hover {
            border-bottom-color: #777;
        }

        .post-id {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* Кнопки поделиться */
        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 40px;
            border-top: 1px solid #eaeaea;
            padding-top: 30px;
        }

        .share-buttons a {
            font-size: 14px;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .share-buttons a:hover {
            border-bottom-color: #111;
        }

        /* Навигация предыдущий/следующий */
        .post-navigation {
            display: flex;
            gap: 30px;
            border-top: 1px solid #eaeaea;
            padding-top: 30px;
            font-size: 14px;
        }

        .post-navigation a {
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .post-navigation a:hover {
            border-bottom-color: #111;
        }

        /* Адаптивность */
        @media (max-width: 1000px) {
            .post-layout {
                grid-template-columns: 1fr 120px 1fr;
            }
        }

        @media (max-width: 800px) {
            .post-layout {
                grid-template-columns: 1fr;
            }

            .left-column {
                position: relative;
                max-height: none;
                border-right: none;
                border-bottom: 1px solid #eaeaea;
                padding: 30px;
            }

            .center-column {
                display: flex;
                gap: 40px;
                justify-content: center;
                border-right: none;
                border-bottom: 1px solid #eaeaea;
                padding: 20px 30px;
            }

            .center-column h2 {
                margin: 0;
            }

            .right-column {
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="post-layout">

        <!-- ЛЕВАЯ КОЛОНКА: Медиа (изображения, видео, iframe) -->
        <div class="left-column">
            <div class="post-media" id="postMedia">
                <div style="color: #999; text-align: center;">Загрузка...</div>
            </div>
        </div>

        <!-- ЦЕНТРАЛЬНАЯ КОЛОНКА: Заголовки -->
        <div class="center-column">
            <h2>Post</h2>
            <h2>Share</h2>
            <h2>Navigation</h2>
        </div>

        <!-- ПРАВАЯ КОЛОНКА: Данные поста -->
        <div class="right-column">
            <div class="post-title" id="postTitle"></div>
            <div class="post-date" id="postDate"></div>
            <div class="post-description" id="postDescription"></div>
            <div class="post-tags" id="postTags"></div>
            <div class="post-id" id="postId"></div>

            <div class="share-buttons" id="shareButtons">
                <!-- будут заполнены скриптом -->
            </div>

            <div class="post-navigation">
                <a href="#" id="prevPost">← Предыдущее</a>
                <a href="#" id="nextPost">Следующее →</a>
            </div>
        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.allPosts = []; // будем хранить все посты для навигации
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) return;
                await this.fetchAllPosts();
                const currentIndex = this.allPosts.findIndex(p =>
                    String(p.id) === this.postId || p.id_string === this.postId
                );
                if (currentIndex === -1) {
                    this.renderNotFound();
                    return;
                }
                const post = this.allPosts[currentIndex];
                this.render(post, currentIndex);
            }

            async fetchAllPosts() {
                try {
                    const res = await fetch('/api/tumblr');
                    const data = await res.json();
                    this.allPosts = data.response.posts || [];
                } catch (e) {
                    console.error('Failed to fetch posts', e);
                }
            }

            // Извлечение только текста из HTML (без тегов)
            extractText(html) {
                if (!html) return '';
                const div = document.createElement('div');
                div.innerHTML = html;
                return div.textContent || div.innerText || '';
            }

            // Извлечение медиа-элементов из HTML (img, video, iframe)
            extractMedia(html) {
                if (!html) return [];
                const div = document.createElement('div');
                div.innerHTML = html;
                return Array.from(div.querySelectorAll('img, video, iframe'));
            }

            render(post, index) {
                // Заголовок
                document.getElementById('postTitle').textContent =
                    post.summary || post.title || '';

                // Дата
                if (post.date) {
                    const d = new Date(post.date);
                    document.getElementById('postDate').textContent =
                        d.toLocaleDateString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                }

                // Описание – только текст, без HTML-тегов
                let descText = '';
                if (post.caption) {
                    descText = this.extractText(post.caption);
                } else if (post.body) {
                    descText = this.extractText(post.body);
                }
                document.getElementById('postDescription').textContent = descText;

                // Теги
                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<a href="/?filter=${encodeURIComponent(tag)}" class="tag">#${tag}</a>`
                        ).join('');
                } else {
                    document.getElementById('postTags').innerHTML = '';
                }

                // ID поста
                document.getElementById('postId').textContent = `ID: ${post.id || post.id_string}`;

                // --- Медиа в левую колонку ---
                const mediaContainer = document.getElementById('postMedia');
                mediaContainer.innerHTML = '';

                // 1. Если это фото-пост с photos
                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        img.alt = '';
                        mediaContainer.appendChild(img);
                    });
                }
                // 2. Если это видео-пост с video_url
                else if (post.video_url) {
                    const video = document.createElement('video');
                    video.src = post.video_url;
                    video.controls = true;
                    video.poster = post.thumbnail_url || '';
                    mediaContainer.appendChild(video);
                }
                // 3. Если это текстовый пост с HTML, извлекаем все медиа
                else if (post.body) {
                    const mediaElements = this.extractMedia(post.body);
                    if (mediaElements.length) {
                        mediaElements.forEach(el => {
                            // Клонируем, чтобы сохранить все атрибуты
                            mediaContainer.appendChild(el.cloneNode(true));
                        });
                    } else {
                        // Если нет медиа, показываем заглушку
                        mediaContainer.innerHTML = '<div style="color:#999;">Нет изображений</div>';
                    }
                }

                // --- Кнопки поделиться ---
                const shareUrl = encodeURIComponent(window.location.href);
                const shareTitle = encodeURIComponent(post.summary || post.title || 'Pletnyov');
                const shareButtons = [
                    { name: 'Facebook', url: `https://www.facebook.com/sharer.php?u=${shareUrl}` },
                    { name: 'LinkedIn', url: `https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}` },
                    { name: 'Pinterest', url: `https://pinterest.com/pin/create/button/?url=${shareUrl}&media=${encodeURIComponent(post.image || '')}&description=${shareTitle}` },
                    { name: 'Tumblr', url: `https://www.tumblr.com/widgets/share/tool?canonicalUrl=${shareUrl}&title=${shareTitle}` },
                    { name: 'Twitter', url: `https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareTitle}` }
                ];
                const shareContainer = document.getElementById('shareButtons');
                shareContainer.innerHTML = shareButtons.map(btn =>
                    `<a href="${btn.url}" target="_blank" rel="noopener">${btn.name}</a>`
                ).join('');

                // --- Навигация предыдущий/следующий ---
                const prevLink = document.getElementById('prevPost');
                const nextLink = document.getElementById('nextPost');
                if (index > 0) {
                    const prevPost = this.allPosts[index - 1];
                    prevLink.href = `/post/${prevPost.id_string || prevPost.id}`;
                } else {
                    prevLink.style.opacity = '0.3';
                    prevLink.style.pointerEvents = 'none';
                }
                if (index < this.allPosts.length - 1) {
                    const nextPost = this.allPosts[index + 1];
                    nextLink.href = `/post/${nextPost.id_string || nextPost.id}`;
                } else {
                    nextLink.style.opacity = '0.3';
                    nextLink.style.pointerEvents = 'none';
                }
            }

            renderNotFound() {
                document.querySelector('.right-column').innerHTML = '<h2>Пост не найден</h2><a href="/">Вернуться на главную</a>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>
</body>

</html>
