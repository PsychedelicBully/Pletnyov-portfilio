<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>
    <link rel="stylesheet" href="/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ====== LEFT COLUMN ====== */

        .left-column {
            padding: 40px 30px 40px 40px;
            border-right: none;
        }

        .post-media img,
        .post-media video,
        .post-media iframe {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        /* ====== RIGHT COLUMN ====== */

        .right-column {
            padding: 40px 0;
            display: contents;
        }

        .row {
            display: contents;
        }

        .section-label {
            grid-column: 2;
            padding: 40px 20px 0 20px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .section-content {
            grid-column: 3;
            padding: 40px 30px 30px 30px;
            max-width: 600px;
        }

        /* ====== POST BLOCK ====== */

        .post-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .post-description {
            margin-bottom: 15px;
        }

        .post-date {
            margin-bottom: 10px;
        }

        .post-tags {
            margin-bottom: 10px;
        }

        .post-tags a {
            display: inline-block;
            margin-right: 15px;
            text-decoration: none;
            color: var(--text-color);
        }

        .post-id {
            margin-top: 5px;
        }

        /* ====== SHARE ====== */

        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .share-buttons a {
            text-decoration: none;
            color: var(--text-color);
        }

        /* ====== NAVIGATION ====== */

        .post-navigation {
            display: flex;
            gap: 30px;
        }

        .post-navigation a {
            text-decoration: none;
            color: var(--text-color);
        }

        .post-layout {
            display: grid;
            grid-template-columns: minmax(320px, 1.2fr) 140px 1fr;
            align-items: start;
            /* ← ВАЖНО */
        }

        @media (max-width: 900px) {

            .post-layout {
                grid-template-columns: 1fr;
            }

            .left-column,
            .section-label,
            .section-content {
                grid-column: 1;
                padding: 30px;
            }

            .section-label {
                padding-bottom: 10px;
            }

            .section-content {
                padding-top: 0;
                padding-bottom: 30px;
            }
        }

        /* ===== Lazy Media Effect ===== */

        .media-item {
            position: relative;
            overflow: hidden;
            background: #f2f2f2;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: auto;
            display: block;

            opacity: 0;
            filter: blur(20px);
            transform: scale(1.05);
            transition:
                opacity 0.6s ease,
                filter 0.8s ease,
                transform 0.8s ease;
        }

        .media-item.loaded img,
        .media-item.loaded video {
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        /* Мобильная версия для главной */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: row;
                justify-content: space-between;
                padding: 0 2rem;
            }

            .header-left {
                width: auto;
                justify-content: flex-start;
            }

            .header-right {
                width: auto;
                justify-content: flex-end;
                gap: 0.5rem;
            }

            .header-right .search-box,
            .header-right .theme-toggle {
                display: none;
            }

            .header-right .filters-link {
                display: inline-block;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="site-title">Pletnyov</a>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                </div>
                <a href="/filters" class="filters-link">Навигация</a>
                <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                    <span class="light-icon">●</span>
                    <span class="dark-icon">○</span>
                </button>
            </div>
        </div>
    </header>

    <div class="post-layout">

        <!-- LEFT COLUMN -->
        <div class="left-column">
            <div class="post-media" id="postMedia">
                <div style="color:#999;">загружаю</div>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">

            <div class="row">
                <div class="section-label">post</div>
                <div class="section-content">
                    <div class="post-title" id="postTitle"></div>
                    <div class="post-description" id="postDescription"></div>
                    <div class="post-date" id="postDate"></div>
                    <div class="post-tags" id="postTags"></div>
                    <div class="post-id" id="postId"></div>
                </div>
            </div>

            <div class="row">
                <div class="section-label">share</div>
                <div class="section-content">
                    <div class="share-buttons" id="shareButtons"></div>
                </div>
            </div>

            <div class="row">
                <div class="section-label">navigation</div>
                <div class="section-content">
                    <div class="post-navigation">
                        <a href="#" id="prevPost">←Назад</a>
                        <a href="#" id="nextPost">Дальше→</a>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.allPosts = [];
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                this.setupThemeToggle();
                if (!this.postId) return;
                await this.fetchAllPosts();
                const currentIndex = this.allPosts.findIndex(p =>
                    String(p.id) === this.postId || p.id_string === this.postId
                );
                if (currentIndex === -1) {
                    this.renderNotFound();
                    return;
                }
                this.render(this.allPosts[currentIndex], currentIndex);
            }

            async fetchAllPosts() {
                try {
                    const res = await fetch('/api/tumblr');
                    const data = await res.json();
                    this.allPosts = data.response.posts || [];
                } catch (e) {
                    console.error(e);
                }
            }

            extractText(html) {
                if (!html) return '';
                const div = document.createElement('div');
                div.innerHTML = html;
                return div.textContent || div.innerText || '';
            }

            extractTitleFromHtml(html) {
                if (!html) return null;
                const div = document.createElement('div');
                div.innerHTML = html;
                const h1 = div.querySelector('h1');
                if (h1) {
                    return h1.innerHTML; // сохраняем ссылки внутри заголовка
                }
                return null;
            }

            extractDescriptionFromHtml(html, removeTitle = true) {
                if (!html) return '';
                const div = document.createElement('div');
                div.innerHTML = html;
                if (removeTitle) {
                    const h1 = div.querySelector('h1');
                    if (h1) h1.remove(); // удаляем заголовок, чтобы он не попал в описание
                }
                return div.textContent || div.innerText || ''; // возвращаем чистый текст без тегов
            }


            setupThemeToggle() {
                const toggleBtn = document.getElementById('themeToggle');
                if (!toggleBtn) return;
                const savedTheme = localStorage.getItem('site-theme');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                }
                toggleBtn.addEventListener('click', () => {
                    document.body.classList.toggle('dark-theme');
                    localStorage.setItem('site-theme',
                        document.body.classList.contains('dark-theme') ? 'dark' : 'light'
                    );
                });
            }

            render(post, index) {
                // Извлекаем заголовок и описание из caption или body
                let titleHtml = '';
                let descriptionText = '';

                if (post.caption) {
                    titleHtml = this.extractTitleFromHtml(post.caption) || '';
                    descriptionText = this.extractDescriptionFromHtml(post.caption, true);
                } else if (post.body) {
                    titleHtml = this.extractTitleFromHtml(post.body) || '';
                    descriptionText = this.extractDescriptionFromHtml(post.body, true);
                } else {
                    // fallback для постов без caption/body (например, демо)
                    titleHtml = post.title || '';
                    descriptionText = '';
                }

                // Заполняем заголовок (может содержать HTML-ссылку)
                document.getElementById('postTitle').innerHTML = titleHtml;

                // Заполняем описание (только текст)
                document.getElementById('postDescription').textContent = descriptionText;

                // Дата
                if (post.date) {
                    const d = new Date(post.date);
                    // Проверяем, валидная ли дата
                    if (!isNaN(d.getTime())) {
                        document.getElementById('postDate').textContent =
                            d.toLocaleDateString('ru-RU', {
                                day: 'numeric',
                                month: 'long',
                                year: 'numeric'
                            });
                    } else {
                        // Если дата не парсится, показываем исходную строку (или можно пустую)
                        document.getElementById('postDate').textContent = post.date;
                    }
                } else {
                    document.getElementById('postDate').textContent = '';
                }

                // Теги
                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<a href="/?filter=${encodeURIComponent(tag)}">${tag}</a>`
                        ).join('');
                } else {
                    document.getElementById('postTags').innerHTML = '';
                }

                // ID
                document.getElementById('postId').textContent = `ID: ${post.id || post.id_string}`;

                /* ===== MEDIA BLOCK (ВОССТАНОВЛЕНО) ===== */

                const mediaContainer = document.getElementById('postMedia');
                mediaContainer.innerHTML = '';

                // 1. Фото Tumblr
                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        img.alt = '';
                        mediaContainer.appendChild(img);
                    });
                }

                // 2. Видео Tumblr
                else if (post.video_url) {
                    const video = document.createElement('video');
                    video.src = post.video_url;
                    video.controls = true;
                    video.poster = post.thumbnail_url || '';
                    video.style.width = '100%';
                    mediaContainer.appendChild(video);
                }

                // 3. Медиа внутри body (iframe, img, video)
                else if (post.body) {
                    const div = document.createElement('div');
                    div.innerHTML = post.body;

                    const mediaElements = div.querySelectorAll('img, video, iframe');

                    if (mediaElements.length) {
                        mediaElements.forEach(el => {
                            el.style.width = '100%';
                            el.style.height = 'auto';
                            mediaContainer.appendChild(el.cloneNode(true));
                        });
                    } else {
                        mediaContainer.innerHTML = '<div style="color:#999;">Нет изображений</div>';
                    }
                }

                /* ===== SHARE ===== */

                const shareUrl = encodeURIComponent(window.location.href);
                const shareTitle = encodeURIComponent(post.summary || post.title || '');

                const shareButtons = [
                    { name: 'Facebook', url: `https://www.facebook.com/sharer.php?u=${shareUrl}` },
                    { name: 'LinkedIn', url: `https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}` },
                    { name: 'Pinterest', url: `https://pinterest.com/pin/create/button/?url=${shareUrl}&description=${shareTitle}` },
                    { name: 'Tumblr', url: `https://www.tumblr.com/widgets/share/tool?canonicalUrl=${shareUrl}&title=${shareTitle}` },
                    { name: 'Twitter', url: `https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareTitle}` }
                ];

                document.getElementById('shareButtons').innerHTML =
                    shareButtons.map(btn =>
                        `<a href="${btn.url}" target="_blank" rel="noopener">${btn.name}</a>`
                    ).join('');

                /* ===== NAVIGATION ===== */

                const prev = document.getElementById('prevPost');
                const next = document.getElementById('nextPost');

                if (index > 0) {
                    const prevPost = this.allPosts[index - 1];
                    prev.href = `/post/${prevPost.id_string || prevPost.id}`;
                    prev.style.opacity = '1';
                    prev.style.pointerEvents = 'auto';
                } else {
                    prev.style.opacity = '0.3';
                    prev.style.pointerEvents = 'none';
                }

                if (index < this.allPosts.length - 1) {
                    const nextPost = this.allPosts[index + 1];
                    next.href = `/post/${nextPost.id_string || nextPost.id}`;
                    next.style.opacity = '1';
                    next.style.pointerEvents = 'auto';
                } else {
                    next.style.opacity = '0.3';
                    next.style.pointerEvents = 'none';
                }
            }

            renderNotFound() {
                document.body.innerHTML = '<h2 style="padding:40px;">Пост не найден</h2>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>

</body>

</html>
