<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #111;
            background: #fff;
        }

        /* ====== GRID LAYOUT ====== */

        .post-layout {
            display: grid;
            grid-template-columns: minmax(320px, 1.2fr) 140px 1fr;
            min-height: 100vh;
        }

        /* ====== LEFT COLUMN (MEDIA) ====== */

        .left-column {
            grid-column: 1;
            grid-row: 1 / span 3;
            padding: 40px 30px 40px 40px;
            border-right: 1px solid #eaeaea;
        }

        .post-media img,
        .post-media video,
        .post-media iframe {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        /* ====== MIDDLE COLUMN (LABELS) ====== */

        .section-label {
            grid-column: 2;
            padding: 40px 20px 0 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ====== RIGHT COLUMN (CONTENT) ====== */

        .section-content {
            grid-column: 3;
            padding: 40px 30px 30px 30px;
            max-width: 600px;
        }

        /* убираем лишний верхний padding у нижних строк */
        .section-label:nth-of-type(n+3),
        .section-content:nth-of-type(n+4) {
            padding-top: 30px;
        }

        /* ====== POST BLOCK ====== */

        .post-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .post-description {
            margin-bottom: 15px;
        }

        .post-date {
            margin-bottom: 10px;
        }

        .post-tags {
            margin-bottom: 10px;
        }

        .post-tags a {
            display: inline-block;
            margin-right: 15px;
            text-decoration: none;
            color: #111;
        }

        .post-id {
            margin-top: 5px;
        }

        /* ====== SHARE ====== */

        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .share-buttons a {
            text-decoration: none;
            color: #111;
        }

        /* ====== NAVIGATION ====== */

        .post-navigation {
            display: flex;
            gap: 30px;
        }

        .post-navigation a {
            text-decoration: none;
            color: #111;
        }

        /* ====== RESPONSIVE ====== */

        @media (max-width: 900px) {

            .post-layout {
                grid-template-columns: 1fr;
            }

            .left-column {
                grid-column: 1;
                grid-row: auto;
                border-right: none;
                border-bottom: 1px solid #eaeaea;
                padding: 30px;
            }

            .section-label {
                grid-column: 1;
                padding: 30px 30px 0 30px;
            }

            .section-content {
                grid-column: 1;
                padding: 15px 30px 30px 30px;
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <a href="/">Pletnyov</a>
    </header>
    
    <div class="post-layout">

        <!-- LEFT COLUMN -->
        <div class="left-column">
            <div class="post-media" id="postMedia">
                <div style="color:#999;">Загрузка...</div>
            </div>
        </div>

        <!-- POST -->
        <div class="section-label">Post</div>
        <div class="section-content">
            <div class="post-title" id="postTitle"></div>
            <div class="post-description" id="postDescription"></div>
            <div class="post-date" id="postDate"></div>
            <div class="post-tags" id="postTags"></div>
            <div class="post-id" id="postId"></div>
        </div>

        <!-- SHARE -->
        <div class="section-label">Share</div>
        <div class="section-content">
            <div class="share-buttons" id="shareButtons"></div>
        </div>

        <!-- NAVIGATION -->
        <div class="section-label">Navigation</div>
        <div class="section-content">
            <div class="post-navigation">
                <a href="#" id="prevPost">Предыдущее</a>
                <a href="#" id="nextPost">Далее</a>
            </div>
        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.allPosts = [];
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) return;
                await this.fetchAllPosts();
                const currentIndex = this.allPosts.findIndex(p =>
                    String(p.id) === this.postId || p.id_string === this.postId
                );
                if (currentIndex === -1) {
                    this.renderNotFound();
                    return;
                }
                this.render(this.allPosts[currentIndex], currentIndex);
            }

            async fetchAllPosts() {
                try {
                    const res = await fetch('/api/tumblr');
                    const data = await res.json();
                    this.allPosts = data.response.posts || [];
                } catch (e) {
                    console.error(e);
                }
            }

            extractText(html) {
                if (!html) return '';
                const div = document.createElement('div');
                div.innerHTML = html;
                return div.textContent || div.innerText || '';
            }

            render(post, index) {

                document.getElementById('postTitle').textContent =
                    post.summary || post.title || '';

                if (post.date) {
                    const d = new Date(post.date);
                    document.getElementById('postDate').textContent =
                        d.toLocaleDateString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                }

                let descText = '';
                if (post.caption) descText = this.extractText(post.caption);
                else if (post.body) descText = this.extractText(post.body);

                document.getElementById('postDescription').textContent = descText;

                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<a href="/?filter=${encodeURIComponent(tag)}">${tag}</a>`
                        ).join('');
                } else {
                    document.getElementById('postTags').innerHTML = '';
                }

                document.getElementById('postId').textContent =
                    `ID: ${post.id || post.id_string}`;

                /* ===== MEDIA BLOCK (ВОССТАНОВЛЕНО) ===== */

                const mediaContainer = document.getElementById('postMedia');
                mediaContainer.innerHTML = '';

                // 1. Фото Tumblr
                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        img.alt = '';
                        mediaContainer.appendChild(img);
                    });
                }

                // 2. Видео Tumblr
                else if (post.video_url) {
                    const video = document.createElement('video');
                    video.src = post.video_url;
                    video.controls = true;
                    video.poster = post.thumbnail_url || '';
                    video.style.width = '100%';
                    mediaContainer.appendChild(video);
                }

                // 3. Медиа внутри body (iframe, img, video)
                else if (post.body) {
                    const div = document.createElement('div');
                    div.innerHTML = post.body;

                    const mediaElements = div.querySelectorAll('img, video, iframe');

                    if (mediaElements.length) {
                        mediaElements.forEach(el => {
                            el.style.width = '100%';
                            el.style.height = 'auto';
                            mediaContainer.appendChild(el.cloneNode(true));
                        });
                    } else {
                        mediaContainer.innerHTML = '<div style="color:#999;">Нет изображений</div>';
                    }
                }

                /* ===== SHARE ===== */

                const shareUrl = encodeURIComponent(window.location.href);
                const shareTitle = encodeURIComponent(post.summary || post.title || '');

                const shareButtons = [
                    { name: 'Facebook', url: `https://www.facebook.com/sharer.php?u=${shareUrl}` },
                    { name: 'LinkedIn', url: `https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}` },
                    { name: 'Pinterest', url: `https://pinterest.com/pin/create/button/?url=${shareUrl}&description=${shareTitle}` },
                    { name: 'Tumblr', url: `https://www.tumblr.com/widgets/share/tool?canonicalUrl=${shareUrl}&title=${shareTitle}` },
                    { name: 'Twitter', url: `https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareTitle}` }
                ];

                document.getElementById('shareButtons').innerHTML =
                    shareButtons.map(btn =>
                        `<a href="${btn.url}" target="_blank" rel="noopener">${btn.name}</a>`
                    ).join('');

                /* ===== NAVIGATION ===== */

                const prev = document.getElementById('prevPost');
                const next = document.getElementById('nextPost');

                if (index > 0) {
                    const prevPost = this.allPosts[index - 1];
                    prev.href = `/post/${prevPost.id_string || prevPost.id}`;
                    prev.style.opacity = '1';
                    prev.style.pointerEvents = 'auto';
                } else {
                    prev.style.opacity = '0.3';
                    prev.style.pointerEvents = 'none';
                }

                if (index < this.allPosts.length - 1) {
                    const nextPost = this.allPosts[index + 1];
                    next.href = `/post/${nextPost.id_string || nextPost.id}`;
                    next.style.opacity = '1';
                    next.style.pointerEvents = 'auto';
                } else {
                    next.style.opacity = '0.3';
                    next.style.pointerEvents = 'none';
                }
            }

            renderNotFound() {
                document.body.innerHTML = '<h2 style="padding:40px;">Пост не найден</h2>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>

</body>

</html>
