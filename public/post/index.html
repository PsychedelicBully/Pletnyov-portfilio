<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pletnyov – Post</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Базовый сброс */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #111;
            background: #fff;
        }

        /* Трёхколоночная сетка */
        .post-layout {
            display: grid;
            grid-template-columns: minmax(300px, 1.2fr) 140px 1fr;
            min-height: 100vh;
        }

        /* Левая колонка – медиа (прокручивается со страницей) */
        .left-column {
            padding: 40px 30px 40px 40px;
            border-right: 1px solid #eaeaea;
        }

        .post-media {
            width: 100%;
        }

        .post-media img,
        .post-media video,
        .post-media iframe {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        /* Центральная колонка – заголовки */
        .center-column {
            padding: 40px 20px;
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            gap: 0;
            /* убираем лишние отступы, управляем через padding у каждого элемента */
        }

        .center-item {
            font-size: 14px;
            color: #111;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            line-height: 1.5;
        }

        /* Заголовок Post – выравниваем с верхней частью правого контента */
        .center-item.post-header {
            padding-top: 0;
            /* будет точно напротив первого элемента правой колонки */
            margin-bottom: 20px;
            /* такой же отступ, как у .post-section */
        }

        /* Заголовок Share – с отступом, соответствующим началу блока share */
        .center-item.share-header {
            margin-top: 30px;
            /* соответствует отступу перед share-блоком */
            margin-bottom: 20px;
        }

        /* Заголовок Navigation – с отступом, соответствующим началу блока navigation */
        .center-item.nav-header {
            margin-top: 30px;
            margin-bottom: 20px;
        }

        /* Правая колонка – данные поста */
        .right-column {
            padding: 40px 30px 40px 30px;
            max-width: 600px;
        }

        .post-section {
            margin-bottom: 30px;
        }

        .post-title {
            font-size: 18px;
            /* на скриншоте заголовок поста чуть крупнее? оставим как есть */
            font-weight: 400;
            margin-bottom: 10px;
        }

        .post-date {
            color: #111;
            margin-bottom: 10px;
        }

        .post-tags {
            margin-bottom: 10px;
        }

        .post-tags .tag {
            display: inline-block;
            color: #111;
            margin-right: 15px;
            text-decoration: none;
        }

        .post-id {
            color: #111;
        }

        .share-section {
            margin-bottom: 30px;
        }

        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .share-buttons a {
            color: #111;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-section {
            margin-bottom: 0;
        }

        .post-navigation {
            display: flex;
            gap: 30px;
        }

        .post-navigation a {
            color: #111;
            text-decoration: none;
            font-size: 14px;
        }

        /* Адаптивность */
        @media (max-width: 1000px) {
            .post-layout {
                grid-template-columns: 1fr 120px 1fr;
            }
        }

        @media (max-width: 800px) {
            .post-layout {
                grid-template-columns: 1fr;
            }

            .left-column {
                border-right: none;
                border-bottom: 1px solid #eaeaea;
                padding: 30px;
            }

            .center-column {
                display: flex;
                flex-direction: row;
                justify-content: space-around;
                border-right: none;
                border-bottom: 1px solid #eaeaea;
                padding: 20px 30px;
            }

            .center-item {
                margin: 0 !important;
                padding: 0;
            }

            .right-column {
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="post-layout">

        <!-- ЛЕВАЯ КОЛОНКА: Медиа -->
        <div class="left-column">
            <div class="post-media" id="postMedia">
                <div style="color: #999;">Загрузка...</div>
            </div>
        </div>

        <!-- ЦЕНТРАЛЬНАЯ КОЛОНКА: Заголовки -->
        <div class="center-column">
            <div class="center-item post-header">Post</div>
            <div class="center-item share-header">Share</div>
            <div class="center-item nav-header">Navigation</div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА: Данные поста -->
        <div class="right-column">
            <div class="post-section">
                <div class="post-title" id="postTitle"></div>
                <div class="post-date" id="postDate"></div>
                <div class="post-tags" id="postTags"></div>
                <div class="post-id" id="postId"></div>
            </div>

            <div class="share-section">
                <div class="share-buttons" id="shareButtons"></div>
            </div>

            <div class="nav-section">
                <div class="post-navigation">
                    <a href="#" id="prevPost">Предыдущее</a>
                    <a href="#" id="nextPost">Далее</a>
                </div>
            </div>
        </div>

    </div>

    <script>
        class PostPage {
            constructor() {
                this.postId = this.getPostId();
                this.allPosts = [];
                this.init();
            }

            getPostId() {
                const parts = window.location.pathname.split('/');
                return parts[parts.length - 1];
            }

            async init() {
                if (!this.postId) return;
                await this.fetchAllPosts();
                const currentIndex = this.allPosts.findIndex(p =>
                    String(p.id) === this.postId || p.id_string === this.postId
                );
                if (currentIndex === -1) {
                    this.renderNotFound();
                    return;
                }
                const post = this.allPosts[currentIndex];
                this.render(post, currentIndex);
            }

            async fetchAllPosts() {
                try {
                    const res = await fetch('/api/tumblr');
                    const data = await res.json();
                    this.allPosts = data.response.posts || [];
                } catch (e) {
                    console.error('Failed to fetch posts', e);
                }
            }

            extractText(html) {
                if (!html) return '';
                const div = document.createElement('div');
                div.innerHTML = html;
                return div.textContent || div.innerText || '';
            }

            extractMedia(html) {
                if (!html) return [];
                const div = document.createElement('div');
                div.innerHTML = html;
                return Array.from(div.querySelectorAll('img, video, iframe'));
            }

            render(post, index) {
                // Заголовок
                document.getElementById('postTitle').textContent =
                    post.summary || post.title || '';

                // Дата
                if (post.date) {
                    const d = new Date(post.date);
                    document.getElementById('postDate').textContent =
                        d.toLocaleDateString('ru-RU', {
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                }

                // Описание (чистый текст) – здесь нет отдельного поля под описание? 
                // На скриншоте Description идёт после заголовка. У нас заголовок уже есть.
                // Если нужно описание, добавим как отдельный элемент.
                // В вашем предыдущем коде был `postDescription`. Добавим его.
                let descEl = document.getElementById('postDescription');
                if (!descEl) {
                    descEl = document.createElement('div');
                    descEl.className = 'post-description';
                    descEl.id = 'postDescription';
                    document.querySelector('.post-section').insertBefore(descEl, document.getElementById('postDate'));
                }
                let descText = '';
                if (post.caption) {
                    descText = this.extractText(post.caption);
                } else if (post.body) {
                    descText = this.extractText(post.body);
                }
                descEl.textContent = descText;

                // Теги
                if (post.tags && post.tags.length) {
                    document.getElementById('postTags').innerHTML =
                        post.tags.map(tag =>
                            `<a href="/?filter=${encodeURIComponent(tag)}" class="tag">${tag}</a>`
                        ).join('');
                } else {
                    document.getElementById('postTags').innerHTML = '';
                }

                // ID поста
                document.getElementById('postId').textContent = `ID: ${post.id || post.id_string}`;

                // Медиа в левую колонку
                const mediaContainer = document.getElementById('postMedia');
                mediaContainer.innerHTML = '';

                if (post.photos && post.photos.length) {
                    post.photos.forEach(photo => {
                        const img = document.createElement('img');
                        img.src = photo.original_size.url;
                        img.alt = '';
                        mediaContainer.appendChild(img);
                    });
                } else if (post.video_url) {
                    const video = document.createElement('video');
                    video.src = post.video_url;
                    video.controls = true;
                    video.poster = post.thumbnail_url || '';
                    mediaContainer.appendChild(video);
                } else if (post.body) {
                    const mediaElements = this.extractMedia(post.body);
                    if (mediaElements.length) {
                        mediaElements.forEach(el => {
                            mediaContainer.appendChild(el.cloneNode(true));
                        });
                    } else {
                        mediaContainer.innerHTML = '<div style="color:#999;">Нет изображений</div>';
                    }
                }

                // Кнопки поделиться
                const shareUrl = encodeURIComponent(window.location.href);
                const shareTitle = encodeURIComponent(post.summary || post.title || 'Pletnyov');
                const shareButtons = [
                    { name: 'Facebook', url: `https://www.facebook.com/sharer.php?u=${shareUrl}` },
                    { name: 'LinkedIn', url: `https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}` },
                    { name: 'Pinterest', url: `https://pinterest.com/pin/create/button/?url=${shareUrl}&media=${encodeURIComponent(post.image || '')}&description=${shareTitle}` },
                    { name: 'Tumblr', url: `https://www.tumblr.com/widgets/share/tool?canonicalUrl=${shareUrl}&title=${shareTitle}` },
                    { name: 'Twitter', url: `https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareTitle}` }
                ];
                document.getElementById('shareButtons').innerHTML = shareButtons.map(btn =>
                    `<a href="${btn.url}" target="_blank" rel="noopener">${btn.name}</a>`
                ).join('');

                // Навигация
                const prevLink = document.getElementById('prevPost');
                const nextLink = document.getElementById('nextPost');
                if (index > 0) {
                    const prevPost = this.allPosts[index - 1];
                    prevLink.href = `/post/${prevPost.id_string || prevPost.id}`;
                    prevLink.style.opacity = '1';
                    prevLink.style.pointerEvents = 'auto';
                } else {
                    prevLink.style.opacity = '0.3';
                    prevLink.style.pointerEvents = 'none';
                }
                if (index < this.allPosts.length - 1) {
                    const nextPost = this.allPosts[index + 1];
                    nextLink.href = `/post/${nextPost.id_string || nextPost.id}`;
                    nextLink.style.opacity = '1';
                    nextLink.style.pointerEvents = 'auto';
                } else {
                    nextLink.style.opacity = '0.3';
                    nextLink.style.pointerEvents = 'none';
                }
            }

            renderNotFound() {
                document.querySelector('.right-column').innerHTML = '<h2>Пост не найден</h2><a href="/">Вернуться на главную</a>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new PostPage();
        });
    </script>
</body>

</html>
